name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux-x64:
    name: Build Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev pkg-config libsecret-1-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux bundle
        run: |
          cd build/linux/x64/release
          tar -czf bolan-linux-x64-${{ github.ref_name }}.tar.gz bundle/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bolan-linux-x64
          path: build/linux/x64/release/bolan-linux-x64-${{ github.ref_name }}.tar.gz

  build-linux-arm64:
    name: Build Linux (arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build libgtk-3-dev pkg-config libsecret-1-dev

      - name: Install dependencies
        run: flutter pub get

      - name: Build Linux
        run: flutter build linux --release

      - name: Package Linux bundle
        run: |
          cd build/linux/arm64/release
          tar -czf bolan-linux-arm64-${{ github.ref_name }}.tar.gz bundle/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bolan-linux-arm64
          path: build/linux/arm64/release/bolan-linux-arm64-${{ github.ref_name }}.tar.gz

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-linux-x64, build-linux-arm64]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: bolan-linux-x64
          path: artifacts/

      - name: Download Linux arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: bolan-linux-arm64
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*
